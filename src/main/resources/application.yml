spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/recruitment_platform
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
    secret: 12345678901234567890123456789012
    expiration: 86400000