# Starts the API and PostgreSQL together for local development with matching environment settings.
version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: recruitment-postgres
    environment:
      POSTGRES_DB: recruitment_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: recruitment-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: .
    container_name: recruitment-platform-api
    depends_on:
      - postgres
      - mailpit
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recruitment_platform
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      JWT_SECRET: "12345678901234567890123456789012"
      JWT_EXPIRATION: "86400000"
    ports:
      - "8080:8080"

volumes:
  postgres_data:
