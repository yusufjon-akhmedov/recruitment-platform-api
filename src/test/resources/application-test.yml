# Test profile settings used by automated tests, including JWT values and integration-test specific Spring configuration.
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: 12345678901234567890123456789012
  expiration: 86400000

app:
  mail:
    from: test@recruitment-platform.local
  email-verification:
    base-url: http://localhost:8080/api/auth/verify-email
    expiration-hours: 24

logging:
  level:
    root: WARN
