# Main application configuration for datasource, JPA validation, Flyway migrations, server port, and JWT settings.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/recruitment_platform
    username: postgres
    password: postgres

    spring:
      autoconfigure:
        exclude:
          - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  expiration: ${JWT_EXPIRATION:86400000}