# Main application configuration for datasource, JPA validation, Flyway migrations, server port, and JWT settings.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/recruitment_platform
    username: postgres
    password: postgres

    spring:
      autoconfigure:
        exclude:
          - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:12345678901234567890123456789012}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  mail:
    from: ${MAIL_FROM:no-reply@recruitment-platform.local}
  email-verification:
    base-url: ${EMAIL_VERIFICATION_BASE_URL:http://localhost:8080/api/auth/verify-email}
    expiration-hours: ${EMAIL_VERIFICATION_EXPIRATION_HOURS:24}
